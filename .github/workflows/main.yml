name: Scheduled Data Sync

on:
  schedule:
    - cron: '0 5 * * *' # Se ejecuta automáticamente todos los días a las 00:00 COT (5:00 UTC)
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la pestaña Actions si lo necesitas

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Update Script
        run: python run_update.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update analytical data [skip ci]" && git push)
